<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HSK 4 — Audio Visual · 600 Characters</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#E8002A;--gold:#FFB800;--ink:#08080D;--paper:#F0EBE0;--jade:#2EAD6E;--dim:#ffffff12;--safe-bottom:env(safe-area-inset-bottom,0px);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--ink);color:var(--paper);font-family:'DM Mono',monospace;display:flex;flex-direction:column;touch-action:pan-y;}

/* TOP BAR */
.topbar{display:flex;align-items:center;padding:10px 16px;gap:12px;border-bottom:1px solid var(--dim);flex-shrink:0;background:#0A0A0F;}
.topbar .logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:4px;color:var(--red);}
.topbar .logo span{color:var(--gold);}
.topbar .mode{font-size:.5rem;letter-spacing:2px;color:#ffffff40;text-transform:uppercase;}
.counter{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.counter small{font-size:.55rem;color:#ffffff30;font-family:'DM Mono',monospace;}

/* PROGRESS */
.prog-wrap{flex-shrink:0;padding:0 16px;background:#0A0A0F;}
.prog-bar{height:3px;background:var(--dim);border-radius:2px;margin:6px 0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .3s;}

/* MAIN STAGE */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:8px 16px;min-height:0;}
.stage-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.03;font-family:'Noto Sans SC',sans-serif;font-size:40vw;font-weight:900;pointer-events:none;user-select:none;color:#fff;}

/* Character — size scales down via JS based on char count */
.char-main{font-family:'Noto Sans SC',sans-serif;font-weight:900;color:var(--paper);line-height:1.05;z-index:1;animation:fadeUp .4s ease;text-align:center;width:100%;word-break:break-all;}
.pinyin-main{font-size:clamp(.9rem,3.5vw,1.6rem);color:var(--gold);letter-spacing:3px;margin-top:4px;z-index:1;animation:fadeUp .4s ease .1s both;text-align:center;}
.meaning-main{font-size:clamp(.8rem,3vw,1.1rem);color:#ffffffcc;margin-top:8px;z-index:1;animation:fadeUp .4s ease .2s both;text-align:center;max-width:90%;line-height:1.5;}
.pos-badge{display:inline-block;font-size:.5rem;letter-spacing:2px;padding:3px 10px;border-radius:2px;margin-top:4px;text-transform:uppercase;z-index:1;animation:fadeUp .4s ease .15s both;}
.pos-n{background:#1a3a5c;color:#7ab4e0;}
.pos-v{background:#3a1a1a;color:#e07a7a;}
.pos-adj{background:#1a3a1a;color:#7ae07a;}
.pos-adv{background:#3a2a1a;color:#e0b47a;}
.pos-conj{background:#2a1a3a;color:#b47ae0;}
.pos-prep{background:#1a3a3a;color:#7ae0e0;}
.pos-other{background:#222;color:#aaa;}

/* Example sentence — toggleable */
.example-wrap{z-index:1;animation:fadeUp .4s ease .3s both;text-align:center;margin-top:8px;max-width:90%;}
.example-main{font-size:clamp(.78rem,3vw,1rem);color:#ffffffaa;line-height:1.7;font-family:'Noto Sans SC',sans-serif;}
.example-en{font-size:clamp(.65rem,2.5vw,.85rem);color:#ffffff35;font-family:'DM Mono',monospace;margin-top:2px;line-height:1.5;}
.example-wrap.hidden{display:none;}

/* Timer ring */
.timer-ring{position:absolute;bottom:12px;right:16px;width:40px;height:40px;}
.timer-ring svg{width:40px;height:40px;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:3;}
.timer-bg{stroke:#ffffff10;}
.timer-fg{stroke:var(--gold);stroke-dasharray:126;stroke-dashoffset:0;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* SWIPE hint */
.swipe-hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-size:.5rem;color:#ffffff18;letter-spacing:2px;white-space:nowrap;pointer-events:none;}

/* BOTTOM CONTROLS — phone optimised */
.controls{flex-shrink:0;background:#0A0A0F;border-top:1px solid var(--dim);padding:10px 12px calc(10px + var(--safe-bottom));display:flex;flex-direction:column;gap:8px;}
.ctrl-row{display:flex;align-items:center;gap:8px;justify-content:center;}
.ctrl{padding:9px 16px;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--dim);background:none;color:#ffffff60;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;flex:1;min-width:0;}
.ctrl:hover,.ctrl:active{color:var(--paper);border-color:#ffffff40;}
.ctrl.primary{background:var(--red);border-color:var(--red);color:#fff;flex:1.5;}
.ctrl.primary:hover,.ctrl.primary:active{background:#ff1a3a;}
.ctrl.active{background:var(--jade);border-color:var(--jade);color:#fff;}
.ctrl.tog-on{background:#1a3a1a;border-color:var(--jade);color:var(--jade);}
.ctrl.rnd-on{background:#3a2a1a;border-color:var(--gold);color:var(--gold);}

/* Speed row */
.speed-row{display:flex;align-items:center;gap:6px;justify-content:center;}
.speed-label{font-size:.5rem;color:#ffffff35;letter-spacing:1px;flex-shrink:0;}
.speed-btns{display:flex;gap:4px;}
.sp-btn{padding:5px 10px;font-family:'DM Mono',monospace;font-size:.58rem;border:1px solid var(--dim);background:none;color:#ffffff45;border-radius:3px;cursor:pointer;transition:all .2s;}
.sp-btn.on{background:var(--gold);border-color:var(--gold);color:var(--ink);}

/* Start screen */
.start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);z-index:10;transition:opacity .5s;padding:24px;}
.start-screen.gone{opacity:0;pointer-events:none;}
.start-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,10vw,5rem);letter-spacing:6px;color:var(--red);line-height:1;margin-bottom:4px;}
.start-title span{color:var(--gold);}
.start-sub{font-size:.65rem;color:#ffffff40;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
.start-btn{padding:14px 44px;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;background:var(--red);border:none;color:#fff;border-radius:4px;cursor:pointer;transition:all .2s;}
.start-btn:hover,.start-btn:active{background:var(--gold);color:var(--ink);}
.start-note{font-size:.58rem;color:#ffffff25;letter-spacing:1px;margin-top:14px;max-width:300px;text-align:center;line-height:1.7;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">HSK<span>4</span></div>
  <div class="mode">Audio Visual</div>
  <div class="counter"><span id="curNum">1</span><small> / <span id="totalNum">600</span></small></div>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="stage" id="stage">
  <div class="stage-bg" id="stageBg"></div>
  <div class="char-main" id="charMain">加油</div>
  <div class="pinyin-main" id="pinyinMain">jiā yóu</div>
  <div><span class="pos-badge pos-v" id="posBadge">v</span></div>
  <div class="meaning-main" id="meaningMain">to add oil; come on! keep it up!</div>
  <div class="example-wrap" id="exWrap">
    <div class="example-main" id="exMain">加油！你能做到的！</div>
    <div class="example-en" id="exEn">Come on! You can do it!</div>
  </div>
  <div class="swipe-hint" id="swipeHint">← swipe to navigate →</div>
  <div class="timer-ring" id="timerRing">
    <svg viewBox="0 0 44 44"><circle class="timer-bg" cx="22" cy="22" r="20"/><circle class="timer-fg" id="timerCircle" cx="22" cy="22" r="20"/></svg>
  </div>

  <div class="start-screen" id="startScreen">
    <div class="start-title">HSK<span>4</span></div>
    <div class="start-sub">600 Characters · Audio Visual</div>
    <button class="start-btn" onclick="startPlayer()">▶ START</button>
    <div class="start-note">Auto-plays all 600 HSK 4 characters with native Chinese audio. Swipe left/right to navigate. Works best with sound on.</div>
  </div>
</div>

<div class="controls">
  <div class="ctrl-row">
    <button class="ctrl" onclick="jumpTo(0)" title="Restart">⏮ Start</button>
    <button class="ctrl" onclick="prev()" title="Previous">◀ Prev</button>
    <button class="ctrl primary" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="ctrl" onclick="next()" title="Next">Next ▶</button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl" id="exBtn" onclick="toggleExample()">📖 Examples On</button>
    <button class="ctrl" id="sentBtn" onclick="toggleSentence()">🗣 Sentences Off</button>
    <button class="ctrl" id="rndBtn" onclick="toggleRandom()">🔀 Random</button>
    <button class="ctrl" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
  </div>
  <div class="speed-row">
    <div class="speed-label">Pause after:</div>
    <div class="speed-btns">
      <button class="sp-btn" onclick="setSpeed(1)" id="sp1">1s</button>
      <button class="sp-btn" onclick="setSpeed(3)" id="sp3">3s</button>
      <button class="sp-btn on" onclick="setSpeed(5)" id="sp5">5s</button>
      <button class="sp-btn" onclick="setSpeed(7)" id="sp7">7s</button>
      <button class="sp-btn" onclick="setSpeed(10)" id="sp10">10s</button>
    </div>
  </div>
</div>

  {c:"作用",p:"zuò yòng",pos:"n",e:"function, role, effect",ex:"发挥作用。",ee:"Play a role."},
  {c:"作者",p:"zuò zhě",pos:"n",e:"author, writer",ex:"这本书的作者。",ee:"The author of this book."},
  {c:"座",p:"zuò",pos:"n",e:"classifier for large buildings, mountains",ex:"一座山。",ee:"A mountain."},
  {c:"座位",p:"zuò wèi",pos:"n",e:"seat",ex:"找座位。",ee:"Find a seat."},
];

// ===== STATE =====
let idx = 0;
let playing = false;
let timer = null;
let interval = 5000;
let muted = false;
let showExample = true;
let randomMode = false;
let readSentence = false;
let order = V.map((_,i)=>i); // current play order
const CIRC = 2 * Math.PI * 20;

// ===== UTILS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pc(p) {
  if (!p) return "pos-other";
  if (p==="n"||p==="num") return "pos-n";
  if (p.startsWith("v")) return "pos-v";
  if (p.startsWith("adj")) return "pos-adj";
  if (p.startsWith("adv")) return "pos-adv";
  if (p.startsWith("conj")) return "pos-conj";
  if (p.startsWith("prep")) return "pos-prep";
  return "pos-other";
}

// ===== AUDIO ENGINE =====
// We use a persistent Web Audio context with a silent oscillator to keep the
// audio session alive when the screen locks, then play Google TTS through it.
let audioCtx = null;
let silentNode = null;
let currentAudio = null;
let speakGen = 0; // incremented each time we start a new speak() — old promises check this and bail

function ensureAudioContext() {
  if (audioCtx && audioCtx.state !== 'closed') return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Play a near-silent tone continuously — this keeps the audio session open
  // on iOS/Android even when the screen turns off.
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.001; // inaudible but non-zero
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  silentNode = { osc, gain };
}

function resumeAudioContext() {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function speakGoogle(text, lang, gen) {
  return new Promise((resolve) => {
    // If a newer speak() has started, bail immediately
    if (gen !== speakGen) { resolve(); return; }
    resumeAudioContext();
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
    const audio = new Audio(url);
    currentAudio = audio;
    const done = () => { currentAudio = null; resolve(); };
    audio.onended = done;
    audio.onerror = done;
    audio.play().catch(done);
  });
}

function stopCurrentAudio() {
  speakGen++; // invalidates all in-progress speakGoogle calls
  if (currentAudio) {
    try { currentAudio.pause(); currentAudio.src = ""; } catch(e) {}
    currentAudio = null;
  }
}

function gap(ms, gen) {
  return new Promise(r => setTimeout(() => {
    if (gen !== speakGen) r(); // bail early if superseded
    else r();
  }, ms));
}

async function speak(w) {
  const gen = ++speakGen;
  if (!muted) {
    try {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: w.c + '  ' + w.p,
          artist: w.e,
          album: 'HSK 4 · 600 Characters',
        });
      }
      await speakGoogle(w.c, 'zh-CN', gen);
      if (gen === speakGen) await gap(350, gen);
      if (gen === speakGen) await speakGoogle(w.e.split(',')[0].trim(), 'en-US', gen);
      if (gen === speakGen && readSentence) {
        await gap(500, gen);
        if (gen === speakGen) await speakGoogle(w.ex, 'zh-CN', gen);
        if (gen === speakGen) await gap(350, gen);
        if (gen === speakGen) await speakGoogle(w.ee, 'en-US', gen);
      }
    } catch(e) {
      // silently fail
    }
  }
  return gen; // always returned — caller checks gen === speakGen to confirm still current
}

function toggleSentence() {
  readSentence = !readSentence;
  const btn = document.getElementById("sentBtn");
  btn.innerHTML = readSentence ? "🗣 Sentences On" : "🗣 Sentences Off";
  btn.classList.toggle("tog-on", readSentence);

  // Disable speed controls in sentence mode — timing is driven by audio length
  document.querySelectorAll('.sp-btn, .speed-label').forEach(b => {
    b.disabled = readSentence;
    b.style.opacity = readSentence ? '0.3' : '1';
  });
  document.querySelector('.speed-label').style.opacity = readSentence ? '0.3' : '1';

  stopCurrentAudio();
  clearRing();
  if (playing) show(idx);
}

// Resume audio context on any user interaction (required by browsers)
['touchstart','touchend','click','keydown'].forEach(ev => {
  document.addEventListener(ev, () => {
    ensureAudioContext();
    resumeAudioContext();
  }, { once: false, passive: true });
});

// Handle page visibility — resume when user returns
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) resumeAudioContext();
});

// Register MediaSession action handlers for lock screen controls
function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.setActionHandler('nexttrack', () => next());
  navigator.mediaSession.setActionHandler('previoustrack', () => prev());
  navigator.mediaSession.setActionHandler('play', () => { if (!playing) play(); });
  navigator.mediaSession.setActionHandler('pause', () => { if (playing) pause(); });
}

// ===== DISPLAY =====
function show(i) {
  idx = i;
  const w = V[order[idx]];

  // Re-trigger animations
  ['charMain','pinyinMain','meaningMain','posBadge','exWrap'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });

  document.getElementById("charMain").textContent = w.c;

  // Scale font size based on character count so long words always fit
  const len = w.c.length;
  const vw = window.innerWidth;
  let size;
  if (len === 1)      size = Math.min(vw * 0.52, 200);
  else if (len === 2) size = Math.min(vw * 0.38, 160);
  else if (len === 3) size = Math.min(vw * 0.26, 110);
  else if (len === 4) size = Math.min(vw * 0.20, 88);
  else                size = Math.min(vw * 0.16, 70);
  document.getElementById("charMain").style.fontSize = size + "px";
  document.getElementById("pinyinMain").textContent = w.p;
  document.getElementById("posBadge").textContent = w.pos;
  document.getElementById("posBadge").className = "pos-badge " + pc(w.pos);
  document.getElementById("meaningMain").textContent = w.e;
  document.getElementById("exMain").textContent = w.ex;
  document.getElementById("exEn").textContent = w.ee;
  document.getElementById("stageBg").textContent = w.c;
  document.getElementById("curNum").textContent = idx + 1;
  document.getElementById("progFill").style.width = ((idx+1)/V.length*100)+"%";

  // Ring stays empty while audio plays
  clearRing();

  speak(w).then((gen) => {
    if (gen !== speakGen || !playing) return;
    if (readSentence) {
      // Sentence mode: just a short breath then next card, no ring
      advanceAfterSpeech();
    } else {
      // Timer mode: NOW start the ring countdown for the pause gap
      startRing();
      scheduleNext();
    }
  });
}

// ===== TIMER RING =====
let ringStart = 0;
let ringRAF = null;

function clearRing() {
  if (ringRAF) { cancelAnimationFrame(ringRAF); ringRAF = null; }
  if (timer) { clearTimeout(timer); timer = null; }
  const circle = document.getElementById("timerCircle");
  circle.style.strokeDashoffset = 0;
}

function startRing() {
  if (ringRAF) cancelAnimationFrame(ringRAF);
  ringStart = Date.now();
  animateRing();
}

function animateRing() {
  const elapsed = Date.now() - ringStart;
  const pct = Math.min(elapsed / interval, 1);
  const circle = document.getElementById("timerCircle");
  circle.style.strokeDashoffset = CIRC * pct;
  if (pct < 1 && playing) {
    ringRAF = requestAnimationFrame(animateRing);
  }
}

// ===== PLAYBACK =====
function startPlayer() {
  ensureAudioContext();
  setupMediaSession();
  document.getElementById("startScreen").classList.add("gone");
  document.getElementById("swipeHint").style.display = "block";
  setTimeout(()=>{ document.getElementById("swipeHint").style.display = "none"; }, 4000);
  idx = 0;
  show(0);
  play();
}

function play() {
  playing = true;
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  const btn = document.getElementById("playBtn");
  btn.innerHTML = "⏸ Pause";
  btn.classList.add("active");
  btn.classList.remove("primary");
  // Don't re-call show() here — startPlayer already called it.
  // Just kick off the audio+schedule chain for the current card.
  const w = V[order[idx]];
  speak(w).then((gen) => {
    if (gen !== speakGen || !playing) return;
    if (readSentence) {
      advanceAfterSpeech();
    } else {
      startRing();
      scheduleNext();
    }
  });
}

function pause() {
  playing = false;
  stopCurrentAudio();
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  const btn = document.getElementById("playBtn");
  btn.innerHTML = "▶ Play";
  btn.classList.remove("active");
  btn.classList.add("primary");
  if (timer) clearTimeout(timer);
  clearRing();
}

function togglePlay() {
  const ss = document.getElementById("startScreen");
  if (!ss.classList.contains("gone")) { startPlayer(); return; }
  if (playing) pause(); else play();
}

function advanceAfterSpeech() {
  setTimeout(() => {
    if (!playing || !readSentence) return;
    if (idx < V.length - 1) { idx++; show(idx); }
    else finish();
  }, 800);
}

function finish() {
  pause();
  document.getElementById("charMain").textContent = "🎉";
  document.getElementById("pinyinMain").textContent = "COMPLETE!";
  document.getElementById("meaningMain").textContent = "You've reviewed all 600 HSK 4 characters. 加油！";
  document.getElementById("exMain").textContent = "";
  document.getElementById("exEn").textContent = "";
}

function scheduleNext() {
  // Only used in timer mode. Called after audio finishes.
  // interval = extra pause to linger on the card before moving on.
  if (timer) clearTimeout(timer);
  if (readSentence) return;
  timer = setTimeout(() => {
    if (!playing || readSentence) return;
    if (idx < V.length - 1) {
      idx++;
      show(idx);
    } else {
      finish();
    }
  }, interval);
}

function next() {
  stopCurrentAudio();
  clearRing();
  if (idx < V.length - 1) { idx++; show(idx); }
}

function prev() {
  stopCurrentAudio();
  clearRing();
  if (idx > 0) { idx--; show(idx); }
}

function jumpTo(i) {
  stopCurrentAudio();
  clearRing();
  show(i);
}

// ===== SPEED =====
function setSpeed(s) {
  interval = s * 1000;
  [1,3,5,7,10].forEach(x => {
    document.getElementById("sp"+x).classList.toggle("on", x===s);
  });
}

// ===== MUTE =====
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById("muteBtn");
  btn.innerHTML = muted ? "🔇 Muted" : "🔊 Sound";
  btn.classList.toggle("tog-on", muted);
}

// ===== EXAMPLE TOGGLE =====
function toggleExample() {
  showExample = !showExample;
  document.getElementById("exWrap").classList.toggle("hidden", !showExample);
  const btn = document.getElementById("exBtn");
  btn.innerHTML = showExample ? "📖 Examples On" : "📖 Examples Off";
  btn.classList.toggle("tog-on", !showExample);
}

// ===== RANDOM MODE =====
function toggleRandom() {
  randomMode = !randomMode;
  const btn = document.getElementById("rndBtn");
  btn.classList.toggle("rnd-on", randomMode);
  btn.innerHTML = randomMode ? "🔀 Random On" : "🔀 Random";
  if (randomMode) {
    order = shuffle(V.map((_,i)=>i));
  } else {
    order = V.map((_,i)=>i);
  }
  stopCurrentAudio();
  clearRing();
  idx = 0;
  show(0);
}

// ===== KEYBOARD =====
document.addEventListener("keydown", e => {
  if (e.key===" "||e.key==="k") { e.preventDefault(); togglePlay(); }
  else if (e.key==="ArrowRight"||e.key==="l") next();
  else if (e.key==="ArrowLeft"||e.key==="j") prev();
  else if (e.key==="m") toggleMute();
  else if (e.key==="e") toggleExample();
  else if (e.key==="r") toggleRandom();
});

// ===== SWIPE =====
let touchStartX = 0;
let touchStartY = 0;
document.getElementById("stage").addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById("stage").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) next(); else prev();
  }
}, {passive:true});

// Set total
document.getElementById("totalNum").textContent = V.length;
</script>
</body>
</html>
